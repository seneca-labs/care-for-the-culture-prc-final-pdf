<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiosk Walkthrough — Care for the Culture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: #efe4ce;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px;
      text-align: center;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 24px 0;
      color: #efe4ce;
    }
    .frame {
      display: inline-block;
      max-width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .frame video {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .caption {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.7;
    }
    a { color: #efe4ce; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Kiosk Experience Walkthrough</h1>
    <div class="frame">
      <video src="output/videos/kiosk-walkthrough.mp4" controls autoplay muted loop playsinline></video>
    </div>
    <p class="caption">Care for the Culture — Freddie kiosk experience. <a href="index.html">Back to deck</a>.</p>
  </div>
</body>
</html>
